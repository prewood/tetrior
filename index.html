<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Homepage</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        #top-bar { position: absolute; top: 0; left: 0; display: flex; align-items: center; z-index: 100; }
        #play-now-btn { padding: 15px 30px; background: #2ecc71; border: none; color: white; font-weight: bold; cursor: pointer; }
        #copyright-text { margin-left: 15px; font-size: 0.9em; color: #888; }

        /* The requested text in the bottom right */
        #bottom-right-text {
            position: absolute; bottom: 10px; right: 15px;
            font-size: 0.8em; color: #444; pointer-events: none;
        }

        #game-container { display: none; text-align: center; }
        canvas { background: #000; border: 4px solid #333; cursor: default; }
        
        #overlay { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); flex-direction: column; justify-content: center; align-items: center; 
        }
    </style>
</head>
<body>

<div id="top-bar">
    <button id="play-now-btn" onclick="startGame()">PLAY SANDBOX</button>
    <span id="copyright-text"> --- press this button</span>
</div>

<div id="bottom-right-text">Tetriyo 0.1.3</div>

<div id="game-container">
    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="game" width="240" height="400"></canvas>
    <div style="margin-top: 10px; color: #666; font-size: 0.8em;">Left Click: Place | Right Click: Rotate</div>
</div>

<div id="overlay">
    <h1 style="color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.4);">GAME OVER.</h1>
    <button onclick="resetGame()">CLEAR BOARD</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');

const ROWS = 20;
const COLS = 12;
const BLOCK_SIZE = 20;

ctx.scale(BLOCK_SIZE, BLOCK_SIZE);

let gameRunning = false;
let isShattered = false;
let debris = []; 

const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
let arena = createMatrix(COLS, ROWS);
const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

function startGame() {
	document.title = "Tetrior";
    document.getElementById('top-bar').style.display = 'none';
    document.getElementById('game-container').style.display = 'block';
    gameRunning = true;
    playerReset();
    update();
}

function resetGame() {
    arena.forEach(row => row.fill(0));
    debris = [];
    isShattered = false;
    player.score = 0;
    scoreElement.innerText = "0";
    document.getElementById('overlay').style.display = 'none';
    gameRunning = true;
    playerReset();
    update(); 
}

function createMatrix(w, h) {
    const matrix = [];
    while (h--) matrix.push(new Array(w).fill(0));
    return matrix;
}

function createPiece(type) {
    if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
    if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
    if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
    if (type === 'O') return [[4,4],[4,4]];
    if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
    if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
    if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
}

function drawMatrix(matrix, offset, alpha = 1) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                ctx.globalAlpha = alpha;
                ctx.fillStyle = colors[value];
                ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                ctx.globalAlpha = 1;
            }
        });
    });
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0) {
                if (!arena[y + o.y] || arena[y + o.y][x + o.x] !== 0) return true;
            }
        }
    }
    return false;
}

function isSupported() {
    player.pos.y++;
    const supported = collide(arena, player);
    player.pos.y--;
    return supported;
}

function canPlace() {
    return !collide(arena, player) && isSupported();
}

function triggerShatter() {
    gameRunning = false;
    isShattered = true;
    
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            if (arena[y][x] !== 0) {
                debris.push({
                    x: x,
                    y: y,
                    color: colors[arena[y][x]],
                    vx: (Math.random() - 0.5) * 0.15, 
                    vy: Math.random() * -0.1,        
                    rotation: 0,
                    vr: (Math.random() - 0.5) * 0.08  
                });
            }
        }
    }
    arena.forEach(row => row.fill(0)); 
    document.getElementById('overlay').style.display = 'flex';
}

function updatePhysics() {
    const gravity = 0.002; // Keeping that slow gravity you liked
    debris.forEach(p => {
        p.vy += gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.rotation += p.vr;

        if (p.y > ROWS - 1) {
            p.y = ROWS - 1;
            p.vy *= -0.4;
            p.vx *= 0.85;  
            p.vr *= 0.6;
        }
        if (p.x < 0 || p.x > COLS - 1) {
            p.vx *= -0.7;
            p.x = p.x < 0 ? 0 : COLS - 1;
        }
    });
}

function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y >= 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) continue outer;
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;
        player.score += rowCount * 100;
        rowCount *= 2;
    }
    scoreElement.innerText = player.score;
}

function playerReset() {
    const pieces = 'ILJOTSZ';
    player.matrix = createPiece(pieces[Math.floor(Math.random() * pieces.length)]);
    if (arena[0].some(val => val !== 0)) {
        triggerShatter();
    }
}

function playerRotate(dir) {
    const matrix = player.matrix;
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
    }
    if (dir > 0) matrix.forEach(row => row.reverse());
    else matrix.reverse();
}

canvas.addEventListener('mousemove', event => {
    if (!gameRunning) return;
    const rect = canvas.getBoundingClientRect();
    const mouseX = (event.clientX - rect.left) / (rect.width / COLS);
    const mouseY = (event.clientY - rect.top) / (rect.height / ROWS);
    player.pos.x = Math.round(mouseX - player.matrix[0].length / 2);
    player.pos.y = Math.round(mouseY - player.matrix.length / 2);
});

canvas.addEventListener('mousedown', event => {
    if (!gameRunning) return;
    if (event.button === 0 && canPlace()) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
            });
        });
        player.score += 10;
        scoreElement.innerText = player.score;
        arenaSweep();
        playerReset();
    } else if (event.button === 2) { 
        playerRotate(1);
    }
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawMatrix(arena, {x: 0, y: 0});
    debris.forEach(p => {
        ctx.save();
        ctx.translate(p.x + 0.5, p.y + 0.5);
        ctx.rotate(p.rotation);
        ctx.fillStyle = p.color;
        ctx.fillRect(-0.5, -0.5, 1, 1);
        ctx.restore();
    });
    if (player.matrix && gameRunning) {
        const valid = canPlace();
        drawMatrix(player.matrix, player.pos, valid ? 1 : 0.3);
    }
}

function update() {
    if (gameRunning) {
        draw();
        requestAnimationFrame(update);
    } else if (isShattered) {
        updatePhysics();
        draw();
        requestAnimationFrame(update);
    }
}

document.addEventListener('keydown', event => {
    if (!gameRunning) return;
    if (event.key === 'e' || event.key === 'ArrowUp' || event.key === 'w') playerRotate(1);
});
</script>
</body>
</html>
